<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>일본 맛집 검색</title>

    <!-- 폰트 로드: Pretendard JP Variable -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-jp-dynamic-subset.min.css" />

    <style>
        :root {
            --ink: #0e0d0b;
            --ink-soft: #1a1814;
            --paper: #f5f0e8;
            --paper-warm: #ede5d4;
            --red: #c0392b;
            --red-glow: rgba(192, 57, 43, 0.4);
            --gold: #c9a84c;
            --gold-soft: rgba(201, 168, 76, 0.15);
            --white-10: rgba(255,255,255,0.07);
            --white-20: rgba(255,255,255,0.12);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; padding: 0; 
            -webkit-tap-highlight-color: transparent; 
            /* 모든 요소에 폰트 강제 적용 */
            font-family: 'Pretendard JP Variable', 'Pretendard JP', 'Pretendard', -apple-system, sans-serif;
        }

        html, body {
            min-height: 100%;
            background: var(--ink);
            color: var(--paper);
            overflow-x: hidden;
        }

        /* 노이즈 텍스처 효과 */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 9999; opacity: 0.6;
        }

        .ambient { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
        .ambient-1 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(192,57,43,0.18) 0%, transparent 70%); top: -200px; right: -100px; animation: drift1 20s ease-in-out infinite; }
        .ambient-2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(201,168,76,0.12) 0%, transparent 70%); bottom: -100px; left: -100px; animation: drift2 25s ease-in-out infinite; }

        @keyframes drift1 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(30px,-40px) scale(1.08)} 66%{transform:translate(-20px,20px) scale(0.95)} }
        @keyframes drift2 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(40px,-30px) scale(1.1)} }

        .jp-deco { position: fixed; top: 0; bottom: 0; writing-mode: vertical-rl; font-size: 11px; letter-spacing: 0.3em; color: rgba(255,255,255,0.04); pointer-events: none; z-index: 1; display: flex; align-items: center; user-select: none; }
        .jp-deco-left { left: 18px; }
        .jp-deco-right { right: 18px; }

        #root { position: relative; z-index: 2; min-height: 100dvh; }
        .page { max-width: 480px; margin: 0 auto; padding: 0 24px 60px; min-height: 100dvh; display: flex; flex-direction: column; }

        .header { padding: 48px 0 0; display: flex; align-items: center; gap: 12px; }
        .header-lantern { width: 8px; height: 8px; background: var(--red); border-radius: 50%; box-shadow: 0 0 12px var(--red-glow); animation: lanternPulse 3s ease-in-out infinite; flex-shrink: 0; }
        @keyframes lanternPulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
        .header-label { font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(255,255,255,0.35); font-weight: 500; }

        .hero { padding: 40px 0 36px; }
        .hero-eyebrow { font-size: 13px; color: var(--gold); letter-spacing: 0.2em; margin-bottom: 16px; opacity: 0.85; }
        .hero-title { font-size: clamp(38px, 10vw, 52px); line-height: 1.05; font-weight: 800; color: var(--paper); margin-bottom: 20px; }
        .hero-title em { font-style: normal; font-weight: 200; color: var(--gold); }

        .form { display: flex; flex-direction: column; gap: 14px; }
        .form-input { 
            width: 100%; padding: 18px 18px 18px 52px; background: var(--white-10); border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 16px; font-size: 16px; font-weight: 600; color: var(--paper); outline: none; transition: all 0.3s;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }
        .form-input:focus { background: var(--white-20); border-color: rgba(201,168,76,0.35); }

        .btn-submit { 
            width: 100%; padding: 19px; background: linear-gradient(135deg, #c0392b 0%, #96281b 100%); border: none; 
            border-radius: 16px; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s;
            box-shadow: 0 8px 32px rgba(192,57,43,0.35); margin-top: 6px;
        }
        .btn-submit:active { transform: scale(0.975); }

        /* 결과 카드 스타일 */
        .card { background: var(--white-10); border: 1px solid rgba(255,255,255,0.07); border-radius: 20px; padding: 20px; margin-bottom: 12px; cursor: pointer; transition: 0.3s; }
        .card:active { background: var(--white-20); transform: scale(0.98); }
        .card-name { font-size: 16px; font-weight: 700; color: var(--paper); margin-bottom: 4px; }
        .card-address { font-size: 12px; color: rgba(255,255,255,0.3); }
        .rating-pill { display: inline-flex; align-items: center; gap: 4px; background: var(--gold-soft); padding: 4px 10px; border-radius: 20px; margin-top: 10px; }
        .rating-val { color: var(--gold); font-weight: 700; font-size: 13px; }

        .loading-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .loading-kanji { font-size: 32px; color: var(--gold); animation: kanjiFade 1.5s infinite; }
        @keyframes kanjiFade { 0%,100%{opacity:0.3} 50%{opacity:1} }
    </style>
</head>
<body>
    <div class="ambient ambient-1"></div>
    <div class="ambient ambient-2"></div>
    <div class="jp-deco jp-deco-left">美食探訪・日本全国・絶品グルメ</div>
    <div class="jp-deco jp-deco-right">食べ歩기・おすすめ・人気店</div>

    <div id="root"></div>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" data-type="module">
        import React, { useState } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';

        const App = () => {
            const [city, setCity] = useState('');
            const [food, setFood] = useState('');
            const [results, setResults] = useState([]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [step, setStep] = useState('input');

            const searchRestaurants = async (e) => {
                if (e) e.preventDefault();
                if (!city.trim() || !food.trim()) return setError('도시와 메뉴를 입력해주세요.');

                setLoading(true);
                setError('');
                setStep('loading');

                try {
                    const res = await fetch('/api/search', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ city, food }),
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || '검색 실패');

                    setResults(data.results);
                    setStep('results');
                } catch (err) {
                    setError(err.message);
                    setStep('input');
                } finally {
                    setLoading(false);
                }
            };

            const handleReset = () => { setCity(''); setFood(''); setStep('input'); setError(''); };

            if (step === 'loading') return (
                <div className="page">
                    <div className="loading-wrap">
                        <div className="loading-kanji">食</div>
                        <p>{city}의 {food} 맛집 분석 중...</p>
                    </div>
                </div>
            );

            if (step === 'results') return (
                <div className="page">
                    <div style={{padding: '48px 0 20px', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                        <h2 style={{fontSize:'24px'}}>{city} {food}</h2>
                        <button onClick={handleReset} style={{background:'none', border:'none', color:'var(--gold)', cursor:'pointer'}}>다시 검색</button>
                    </div>
                    {results.map((item, i) => (
                        <div key={i} className="card" onClick={() => window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.name + ' ' + item.address)}`, '_blank')}>
                            <div className="card-name">{item.name}</div>
                            <div className="card-address">{item.address}</div>
                            <div className="rating-pill">
                                <span className="rating-val">★ {item.rating}</span>
                                <span style={{fontSize:'11px', color:'rgba(255,255,255,0.3)', marginLeft:'8px'}}>리뷰 {item.reviewCount}</span>
                            </div>
                        </div>
                    ))}
                </div>
            );

            return (
                <div className="page">
                    <div className="header">
                        <div className="header-lantern"></div>
                        <span className="header-label">Japan Food Finder</span>
                    </div>
                    <div className="hero">
                        <div className="hero-eyebrow">美食探訪</div>
                        <h1 className="hero-title">일본 어디서<br /><em>드시나요?</em></h1>
                        <p style={{fontSize:'14px', color:'rgba(255,255,255,0.5)'}}>구글 평점으로 검증된 맛집만 찾아드려요.</p>
                    </div>
                    <form className="form" onSubmit={searchRestaurants}>
                        <input className="form-input" value={city} onChange={e=>setCity(e.target.value)} placeholder="도시 (예: 도쿄)" />
                        <input className="form-input" value={food} onChange={e=>setFood(e.target.value)} placeholder="메뉴 (예: 라멘)" />
                        {error && <p style={{color:'var(--red)', fontSize:'13px'}}>{error}</p>}
                        <button type="submit" className="btn-submit">맛집 검색하기 →</button>
                    </form>
                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
