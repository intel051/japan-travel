      75% { transform: translateX(3px); }
    }
    .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
    
    .fade-in { animation: fadeIn 0.5s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    
    .slide-in { animation: slideIn 0.3s ease-out; }
    @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    
    .zoom-in { animation: zoomIn 0.3s ease-out; }

    // --- 노선 아이콘 Prefix 추출 함수 (알파벳만 정확히 추출) ---
    const getLinePrefix = (code) => {
      const match = code.match(/^[A-Za-z]+/);
      return match ? match[0] : '';
    };

    // --- 앱 상태 (State) 관리 ---
    let state = {
      view: 'home',
      quizMode: 'basic',
      selectedLine: 'JY',
      quizData: [],
      currentIndex: 0,
      score: 0,
      inputValue: '',
      feedback: null,
      showAnswer: false
    };

    const app = document.getElementById('app');

    // --- 화면 렌더링 함수 ---
    function updateApp() {
      app.innerHTML = '';
      if (state.view === 'home') app.appendChild(createHomeView());
      else if (state.view === 'quiz') app.appendChild(createQuizView());
      else if (state.view === 'result') app.appendChild(createResultView());
      
      lucide.createIcons();
    }

    // --- 홈 화면 ---
    function createHomeView() {
      const div = document.createElement('div');
      div.className = "flex flex-col h-full fade-in w-full bg-[#FAFAFA]";

      let lineHtml = Object.entries(SUBWAY_LINES).map(([key, line]) => {

        return `
          <button onclick="window.prepareQuiz('${state.quizMode}', '${key}')" class="w-full p-4 bg-white border border-slate-100 hover:border-slate-300 rounded-xl flex items-center gap-4 transition-all group active:scale-[0.98] shadow-sm">

              <div class="font-bold text-slate-700 text-sm">${line.name}</div>

        questionHtml = `
          <div class="text-center mb-12">
            <div class="w-20 h-20 rounded-full border-[6px] flex items-center justify-center mx-auto mb-6 bg-white shadow-sm" style="border-color: ${line.color}">
              <span class="text-xl font-bold text-slate-700 tracking-tighter">${currentItem.code}</span>
            </div>
            <h2 class="text-xl font-bold text-slate-800 tracking-tight">이 역의 이름은?</h2>
          </div>
        `;
      }

      let inputClass = "w-full p-4 rounded-xl bg-white border transition-all outline-none text-center text-base font-bold shadow-sm ";
      let iconHtml = '';
      if (state.feedback === 'correct') {
        inputClass += "border-[#00BC8D] text-[#00BC8D]";
        iconHtml = `<i data-lucide="check-circle" class="text-[#00BC8D] w-5 h-5"></i>`;
      } else if (state.feedback === 'wrong') {
        inputClass += "border-[#E85298] text-[#E85298] animate-shake";
        iconHtml = `<i data-lucide="x-circle" class="text-[#E85298] w-5 h-5"></i>`;
      } else {
        inputClass += "border-slate-200 focus:border-[#222] text-slate-700";
      }

      let formContentHtml = '';
      if (state.showAnswer) {
        formContentHtml = `
          <div class="p-4 bg-white border border-slate-200 rounded-xl text-center shadow-sm zoom-in">
            <p class="text-[9px] text-slate-400 font-bold mb-1 uppercase tracking-widest">정답</p>
            <p class="text-lg font-bold text-slate-800">${currentItem.kr}</p>
            <p class="text-[10px] text-slate-500 font-medium mt-1">${currentItem.jp} | ${currentItem.en}</p>
          </div>
        `;
      } else if (!state.feedback) {
        formContentHtml = `
          <div class="flex gap-2 pt-1">
            <button type="submit" class="flex-[3] p-4 bg-[#222] text-white rounded-xl text-sm font-bold active:scale-[0.98] transition-all">
              제출하기
            </button>
            <button type="button" onclick="window.handleSkip()" class="flex-1 p-4 bg-white border border-slate-200 text-slate-400 rounded-xl text-sm font-bold active:scale-[0.98] transition-all shadow-sm">
              패스
            </button>
          </div>
        `;
      } else if (state.feedback === 'wrong') {
        formContentHtml = `
          <div class="flex gap-2 pt-1 fade-in">
            <button type="button" onclick="window.handleRetryInput()" class="flex-[3] p-4 bg-white border border-[#E85298] text-[#E85298] rounded-xl text-sm font-bold active:scale-[0.98] transition-all shadow-sm">
              다시 입력하기
            </button>
            <button type="button" onclick="window.handleSkip()" class="flex-1 p-4 bg-white border border-slate-200 text-slate-400 rounded-xl text-sm font-bold active:scale-[0.98] transition-all shadow-sm">
              패스
            </button>
          </div>
        `;
      }

      div.innerHTML = `
        <div class="flex items-center justify-between mb-8 pt-4 shrink-0">
          <button onclick="window.exitQuiz()" class="p-2 -ml-2 text-slate-400 hover:text-slate-600 transition-colors">
            <i data-lucide="chevron-left" class="w-5 h-5"></i>
          </button>
          <div class="flex-1 px-8">
            <div class="h-1 bg-slate-200 rounded-full overflow-hidden">
              <div class="h-full bg-[#222] transition-all duration-500" style="width: ${progress}%"></div>
            </div>
          </div>
          <span class="text-[10px] font-bold text-slate-400 w-8 text-right">${state.currentIndex + 1} / ${state.quizData.length}</span>
        </div>
        <div class="flex-1 flex flex-col items-center max-w-sm mx-auto w-full justify-center pb-20">
          <div class="px-3 py-1 bg-white border border-slate-200 rounded-md text-[9px] font-bold text-slate-500 mb-8 uppercase tracking-widest shadow-sm">
            ${line.name}
          </div>
          ${questionHtml}
          <form id="quiz-form" class="w-full space-y-4">
            <div class="relative">
              <input
                id="quiz-input"
                type="text"
                value="${state.inputValue}"
                ${state.feedback === 'correct' || state.showAnswer ? 'disabled' : ''}
                placeholder="역 이름을 입력하세요"
                class="${inputClass}"
              />
              <div class="absolute right-4 top-1/2 -translate-y-1/2">
                ${iconHtml}
              </div>
            </div>
            ${formContentHtml}
          </form>
        </div>
      `;

      // --- 입력 이벤트 처리 ---
      const inputEl = div.querySelector('#quiz-input');
      if (inputEl) {
        setTimeout(() => inputEl.focus(), 50);
        inputEl.addEventListener('input', (e) => {
          state.inputValue = e.target.value;
          if (state.feedback === 'wrong') {
            state.feedback = null;
            updateApp();
          }
        });
      }

      const formEl = div.querySelector('#quiz-form');
      if (formEl) {
        formEl.addEventListener('submit', (e) => {
          e.preventDefault();
          window.checkAnswer();
        });
      }

      return div;
    }

    // --- 결과 화면 ---
    function createResultView() {
      const div = document.createElement('div');
      div.className = "h-full bg-[#FAFAFA] flex flex-col items-center justify-center p-8 zoom-in text-center w-full";
      
      const total = state.quizData.length;
      const percent = Math.round((state.score / total) * 100);
      const msg = percent === 100 ? "완벽합니다! 도쿄 지하철 마스터네요." : "수고하셨습니다. 다시 도전해볼까요?";

      div.innerHTML = `
        <div class="w-16 h-16 bg-[#222] rounded-2xl flex items-center justify-center mb-8 shadow-sm rotate-3 shrink-0">
          <i data-lucide="trophy" class="text-white w-7 h-7 -rotate-3"></i>
        </div>
        <div class="mb-10">
          <h2 class="text-2xl font-bold text-slate-800 mb-2 tracking-tighter">결과 확인</h2>
          <p class="text-slate-500 text-xs font-medium">${msg}</p>
        </div>
        <div class="w-full max-w-xs grid grid-cols-2 gap-3 mb-10">
          <div class="bg-white rounded-xl p-5 border border-slate-100 shadow-sm">
            <p class="text-[9px] font-bold text-slate-400 uppercase mb-1 tracking-widest">Score</p>
            <p class="text-2xl font-bold text-[#222]">${state.score}<span class="text-xs text-slate-300 font-medium"> / ${total}</span></p>
          </div>
          <div class="bg-white rounded-xl p-5 border border-slate-100 shadow-sm">
            <p class="text-[9px] font-bold text-slate-400 uppercase mb-1 tracking-widest">Accuracy</p>
            <p class="text-2xl font-bold text-slate-700">${percent}%</p>
          </div>
        </div>
        <div class="w-full max-w-xs space-y-2">
          <button onclick="window.prepareQuiz('${state.quizMode}', '${state.selectedLine}')" class="w-full p-4 bg-[#222] text-white rounded-xl text-sm font-bold active:scale-[0.98] transition-all shadow-sm">
            다시 시도하기
          </button>
          <button onclick="window.exitQuiz()" class="w-full p-4 bg-white border border-slate-200 text-slate-500 rounded-xl text-sm font-bold active:scale-[0.98] transition-all shadow-sm">
            홈으로 가기
          </button>
        </div>
      `;
      return div;
    }

    // --- 이벤트 핸들러 ---
    window.setMode = (mode) => {
      state.quizMode = mode;
      updateApp();
    };

    window.prepareQuiz = (mode, lineKey) => {
      state.quizMode = mode;
      state.selectedLine = lineKey;
      const line = SUBWAY_LINES[lineKey];
      let items = [];

      if (mode === 'basic') {
        items = [...line.stations].sort(() => Math.random() - 0.5);
      } else {
        items = line.stations
          .map((item, idx) => ({ ...item, originalIndex: idx }))
          .filter((_, idx) => idx > 0 && idx < line.stations.length - 1)
          .sort(() => Math.random() - 0.5);
      }

      state.quizData = items.slice(0, 10); // 최대 10문제
      state.currentIndex = 0;
      state.score = 0;
      state.inputValue = '';
      state.feedback = null;
      state.showAnswer = false;
      state.view = 'quiz';
      updateApp();
    };

    window.checkAnswer = () => {
      if (state.feedback === 'correct' || state.showAnswer || !state.inputValue.trim()) return;

      const input = state.inputValue.trim().replace(/\s+/g, '').toLowerCase();
      const currentItem = state.quizData[state.currentIndex];
      const correctKr = currentItem.kr.replace(/\s+/g, '');
      const correctJp = currentItem.jp.replace(/\s+/g, '');
      const correctEn = currentItem.en.toLowerCase().replace(/\s+/g, '');

      if ([correctKr, correctJp, correctEn].includes(input)) {
        state.feedback = 'correct';
        state.score += 1;
        updateApp();
        setTimeout(window.handleNext, 800);
      } else {
        state.feedback = 'wrong';
        updateApp();
      }
    };

    window.handleNext = () => {
      if (state.currentIndex < state.quizData.length - 1) {
        state.currentIndex += 1;
        state.inputValue = '';
        state.feedback = null;
        state.showAnswer = false;
        updateApp();
      } else {
        state.view = 'result';
        updateApp();
      }
    };

    window.handleSkip = () => {
      state.showAnswer = true;
      updateApp();
      setTimeout(window.handleNext, 2000);
    };

    window.handleRetryInput = () => {
      state.inputValue = '';
      state.feedback = null;
      updateApp();
    };

    window.exitQuiz = () => {
      state.view = 'home';
      updateApp();
    };

    // --- 초기화 ---
    updateApp();

  </script>
</body>
</html>
